{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hangar-cloud.fullname" . }}
  labels:
    {{- include "hangar-cloud.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hangar-cloud.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow REST and gRPC traffic
    - ports:
        - port: {{ .Values.services.rest.port }}
          protocol: TCP
        - port: {{ .Values.services.grpc.port }}
          protocol: TCP
    {{- if .Values.networkPolicy.allowMonitoring }}
    # Allow Prometheus scraping on metrics port
    - ports:
        - port: {{ .Values.services.grpc.port }}
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    # Allow Redis
    - ports:
        - port: 6379
          protocol: TCP
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
