apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hangar-cloud.fullname" . }}
  labels:
    {{- include "hangar-cloud.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hangar-cloud.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "hangar-cloud.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hangar-cloud.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: HANGAR_ENABLE_GRPC
              value: {{ .Values.config.enableGrpc | quote }}
            - name: HANGAR_ENABLE_REST
              value: {{ .Values.config.enableRest | quote }}
            - name: HANGAR_ENABLE_BILLING
              value: {{ .Values.config.enableBilling | quote }}
            - name: HANGAR_GRPC_ADDR
              value: {{ .Values.config.grpcAddr | quote }}
            - name: HANGAR_REST_ADDR
              value: {{ .Values.config.restAddr | quote }}
            - name: HANGAR_METRICS_ADDR
              value: {{ .Values.config.metricsAddr | quote }}
            {{- if .Values.config.cors.allowedOrigins }}
            - name: HANGAR_CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.cors.allowedOrigins | quote }}
            {{- end }}
            {{- if .Values.config.ws.allowedOrigins }}
            - name: HANGAR_WS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.ws.allowedOrigins | quote }}
            {{- end }}
            - name: HANGAR_DATABASE_MIGRATIONS_PATH
              value: {{ .Values.config.database.migrationsPath | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hangar-cloud.databaseSecretName" . }}
                  key: {{ include "hangar-cloud.databaseSecretKey" . }}
            - name: HANGAR_DATABASE_URL
              value: {{ include "hangar-cloud.databaseURL" . | quote }}
            - name: HANGAR_REDIS_ADDR
              value: {{ include "hangar-cloud.redisAddr" . | quote }}
            {{- if and (not .Values.redis.enabled) .Values.externalRedis.existingSecret }}
            - name: HANGAR_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ .Values.externalRedis.secretKey | default "redis-password" }}
            {{- end }}
            - name: HANGAR_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "hangar-cloud.fullname" . }}-secrets{{ end }}
                  key: jwt-secret
            - name: HANGAR_AUTH_SECURE_COOKIES
              value: {{ .Values.config.auth.secureCookies | quote }}
            {{- if .Values.config.stripe.apiKey }}
            - name: HANGAR_STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hangar-cloud.fullname" . }}-secrets
                  key: stripe-api-key
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
