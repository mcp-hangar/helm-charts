apiVersion: v1
kind: Service
metadata:
  name: {{ include "hangar-cloud.fullname" . }}-rest
  labels:
    {{- include "hangar-cloud.labels" . | nindent 4 }}
    hangar.io/service: rest
spec:
  type: {{ .Values.services.rest.type }}
  ports:
    - port: {{ .Values.services.rest.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hangar-cloud.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hangar-cloud.fullname" . }}-grpc
  labels:
    {{- include "hangar-cloud.labels" . | nindent 4 }}
    hangar.io/service: grpc
spec:
  type: {{ .Values.services.grpc.type }}
  ports:
    - port: {{ .Values.services.grpc.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "hangar-cloud.selectorLabels" . | nindent 4 }}

