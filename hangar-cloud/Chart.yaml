apiVersion: v2
name: hangar-cloud
description: Hangar Cloud SaaS control plane — Go backend for multi-tenant MCP fleet management
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - mcp
  - hangar
  - ai
  - llm
  - fleet
home: https://mcp-hangar.io
sources:
  - https://github.com/mcp-hangar/hangar-cloud
maintainers:
  - name: MCP Hangar Team
    email: team@mcp-hangar.io
dependencies:
  - name: postgresql
    version: "15.5.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

