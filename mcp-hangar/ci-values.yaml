# Production-like values for CI dry-run testing.
# This file is used in CI to validate template rendering with realistic
# configuration. It is NOT intended for actual deployment.

replicaCount: 2

config:
  mode: http
  port: 8080
  logLevel: INFO
  jsonLogs: true

service:
  type: ClusterIP
  port: 8080

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    memory: 1Gi

networkPolicy:
  enabled: true
  allowMonitoring: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1
