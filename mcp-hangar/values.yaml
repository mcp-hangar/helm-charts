# MCP-Hangar Server Configuration

replicaCount: 1

image:
  repository: ghcr.io/mcp-hangar/mcp-hangar
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mcp-hangar.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcp-hangar
          topologyKey: kubernetes.io/hostname

# MCP-Hangar specific configuration
config:
  mode: http
  port: 8080
  logLevel: INFO
  jsonLogs: true
  # The 1.5 server refuses to bind HTTP on a non-loopback interface unless
  # either an `auth` block is configured below or this is set to true.
  # Leave this false and configure `auth` for any non-demo deployment.
  unsafeNoAuth: false

# MCP servers configuration
mcp_servers: {}
  # example:
  #   math:
  #     mode: subprocess
  #     command: ["python", "-m", "example_provider"]

# Auth configuration, rendered into config.yaml's top-level `auth:` section.
# Required for the server to bind HTTP on a non-loopback interface unless
# config.unsafeNoAuth is set to true (demo/insecure only).
auth: {}

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# ConfigMap for hangar config.yaml
configMap:
  create: true

# ── Network Policy ─────────────────────────────────────────────────────

networkPolicy:
  enabled: true
  # Allow ingress from the monitoring namespace (Prometheus scraping) on the service port
  allowMonitoring: true
  # Namespace label (kubernetes.io/metadata.name) that Prometheus/monitoring runs in.
  # Only used when allowMonitoring is true.
  monitoringNamespace: monitoring
  # Additional ingress rules (appended as-is; use to allow other namespaces/peers)
  additionalIngress: []
  # Allow egress to any pod in the release namespace (all ports/protocols).
  # Covers co-located MCP backends (mcp_servers.*.mode: remote endpoints running
  # in this namespace) as well as the helm-test connection hook pod reaching the
  # gateway. Disable only if you scope backend access via additionalEgress instead.
  allowSameNamespaceEgress: true
  # Allow egress on 443/TCP to anywhere. Needed for OIDC issuer/JWKS discovery
  # and for remote MCP backends reachable over HTTPS outside the release
  # namespace.
  allowHTTPSEgress: true
  # Additional egress rules (appended as-is). Required for anything not covered
  # above, e.g.:
  #   - MCP backends running in a different namespace or outside the cluster
  #     (add a namespaceSelector/podSelector rule, or a to.ipBlock/to.ipBlock+
  #     ports rule for external endpoints)
  #   - Non-443 external endpoints (OIDC on a nonstandard port, plaintext HTTP
  #     backends outside the release namespace, etc.)
  additionalEgress: []

# ── Pod Disruption Budget ──────────────────────────────────────────────

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
