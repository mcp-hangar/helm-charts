apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mcp-hangar.fullname" . }}-test-connection"
  labels:
    {{- include "mcp-hangar.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.37
      command: ['wget']
      args: ['--spider', '--timeout=5', '{{ include "mcp-hangar.fullname" . }}:{{ .Values.service.port }}/health/ready']
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
  restartPolicy: Never
