{{- if .Values.configMap.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-hangar.fullname" . }}
  labels:
    {{- include "mcp-hangar.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: {{ .Values.config.logLevel }}
      json_format: {{ .Values.config.jsonLogs }}

    mcp_servers:
      {{- if .Values.mcp_servers }}
      {{- toYaml .Values.mcp_servers | nindent 6 }}
      {{- else }}
      {}
      {{- end }}
    {{- with .Values.auth }}

    auth:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
