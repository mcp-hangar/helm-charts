{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-hangar.fullname" . }}
  labels:
    {{- include "mcp-hangar.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-hangar.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP traffic on the service port
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    {{- if .Values.networkPolicy.allowMonitoring }}
    # Allow Prometheus scraping
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
