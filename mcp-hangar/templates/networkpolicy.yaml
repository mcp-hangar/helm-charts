{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-hangar.fullname" . }}
  labels:
    {{- include "mcp-hangar.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-hangar.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP traffic on the service port, scoped to the release namespace
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
    {{- if .Values.networkPolicy.allowMonitoring }}
    # Allow Prometheus scraping from the monitoring namespace
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.networkPolicy.allowSameNamespaceEgress }}
    # Allow egress to any pod in the release namespace on any port. Covers
    # co-located MCP backends and the helm-test connection hook pod talking
    # back to the gateway.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
    {{- end }}
    {{- if .Values.networkPolicy.allowHTTPSEgress }}
    # Allow HTTPS egress to anywhere. Needed for OIDC issuer/JWKS discovery and
    # for remote MCP backends reachable over HTTPS outside the release namespace.
    - ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
