# Publishes each chart to the GHCR OCI registry on push to main, skipping any
# chart whose version is already published (idempotent). See ADR-009
# (independent release topology, mcp-hangar/mcp-hangar#410).
name: release-charts

on:
  push:
    branches: [main]
    paths:
      - 'mcp-hangar/**'
      - 'mcp-hangar-operator/**'
      - 'hangar-agent/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR OCI
  id-token: write   # keyless cosign signing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: [mcp-hangar, mcp-hangar-operator, hangar-agent]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      # helm registry login authenticates `helm push`; cosign reads the *docker*
      # config, so it needs its own GHCR login or the signature push 401s.
      - name: Registry login (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: helm lint "${{ matrix.chart }}"

      - name: Publish if the version is new
        run: |
          set -euo pipefail
          name="${{ matrix.chart }}"
          version="$(helm show chart "$name" | awk -F': *' '/^version:/{print $2; exit}')"
          if helm pull "oci://ghcr.io/mcp-hangar/charts/${name}" --version "$version" -d /tmp/pull >/dev/null 2>&1; then
            echo "::notice::${name} ${version} already published — skipping push."
          else
            helm package "$name" -d /tmp/pkg
            helm push "/tmp/pkg/${name}-${version}.tgz" oci://ghcr.io/mcp-hangar/charts
          fi

      # Sign + attest the current version by tag (cosign resolves it to a digest).
      # Runs whether the chart was just pushed or already published, so a version
      # that was published unsigned gets signed on the next run.
      - name: Sign and attest (keyless)
        run: |
          set -euo pipefail
          name="${{ matrix.chart }}"
          version="$(helm show chart "$name" | awk -F': *' '/^version:/{print $2; exit}')"
          ref="ghcr.io/mcp-hangar/charts/${name}:${version}"
          cosign sign --yes "$ref"
          rm -rf /tmp/sbom-src && mkdir -p /tmp/sbom-src
          helm pull "oci://ghcr.io/mcp-hangar/charts/${name}" --version "$version" -d /tmp/sbom-src
          syft "/tmp/sbom-src/${name}-${version}.tgz" -o cyclonedx-json="/tmp/sbom-${name}.json"
          cosign attest --yes --predicate "/tmp/sbom-${name}.json" --type cyclonedx "$ref"
