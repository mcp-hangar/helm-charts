# Publishes each chart to the GHCR OCI registry on push to main, skipping any
# chart whose version is already published (idempotent). See ADR-009
# (independent release topology, mcp-hangar/mcp-hangar#410).
name: release-charts

on:
  push:
    branches: [main]
    paths:
      - 'mcp-hangar/**'
      - 'mcp-hangar-operator/**'
      - 'hangar-agent/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR OCI
  id-token: write   # keyless cosign signing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: [mcp-hangar, mcp-hangar-operator, hangar-agent]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: Registry login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Lint
        run: helm lint "${{ matrix.chart }}"

      - name: Package, push, and sign if the version is new
        run: |
          set -euo pipefail
          name="${{ matrix.chart }}"
          version="$(helm show chart "$name" | awk -F': *' '/^version:/{print $2; exit}')"
          if helm pull "oci://ghcr.io/mcp-hangar/charts/${name}" --version "$version" -d /tmp/pull >/dev/null 2>&1; then
            echo "::notice::${name} ${version} already published — skipping."
            exit 0
          fi
          pkg="/tmp/pkg/${name}-${version}.tgz"
          helm package "$name" -d /tmp/pkg
          push_out="$(helm push "$pkg" oci://ghcr.io/mcp-hangar/charts 2>&1)"
          echo "$push_out"
          digest="$(echo "$push_out" | awk '/[Dd]igest:/{print $NF}')"
          ref="ghcr.io/mcp-hangar/charts/${name}@${digest}"
          echo "::notice::signing ${ref}"
          # Keyless cosign signature + CycloneDX SBOM attestation on the chart.
          cosign sign --yes "$ref"
          syft "$pkg" -o cyclonedx-json=/tmp/sbom-"${name}".json
          cosign attest --yes --predicate /tmp/sbom-"${name}".json --type cyclonedx "$ref"
