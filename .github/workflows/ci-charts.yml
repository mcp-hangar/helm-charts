# Why this exists: this repo had zero chart CI -- no `helm lint`, no
# `helm template`, no install test. Three charts shipped in states that
# could not actually be installed (see #25, #26, #27, #30, #31, #32, #33,
# #34), each found by hand during a live test campaign. Rendering cleanly
# is not the same as installing and working: a config key the image
# rejects, a CLI flag the image doesn't accept, CRDs that don't match what
# the image watches, or a `--wait` that hangs on the default replica count
# all produce charts that lint and template fine and then crashloop or
# hang for a real user. This workflow asserts INSTALL, not just render.
name: ci-charts

on:
  # Deliberately NOT path-filtered: this workflow is meant to be a required
  # status check (see the `charts-required` job below), and a path-filtered
  # required check deadlocks every PR that doesn't touch a matching path --
  # GitHub blocks the merge waiting on a check run that GitHub itself never
  # schedules. Every PR triggers the workflow; the `detect` job decides
  # internally whether the heavy jobs need to actually do anything.
  pull_request:
  push:
    branches: [main]
    paths:
      - 'mcp-hangar/**'
      - 'mcp-hangar-operator/**'
      - '.github/workflows/ci-charts.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KUBECONFORM_VERSION: v0.8.0
  # Deliberate choices, not moving defaults: KUBERNETES_VERSION,
  # KIND_VERSION and KIND_NODE_IMAGE must stay in sync (the node image and
  # kubeconform's schema version both come from the same k8s release).
  KUBERNETES_VERSION: "1.32.8"
  KIND_VERSION: v0.30.0
  KIND_NODE_IMAGE: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1

jobs:
  # Runs on every PR (see the un-filtered `on:` above) and decides whether
  # the heavy jobs below need to do anything. A chart-touching PR gets the
  # full run; a docs-only PR skips straight to a green `charts-required`.
  detect:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'mcp-hangar/**'
              - 'mcp-hangar-operator/**'
              - '.github/workflows/ci-charts.yml'

  # Fast: no cluster. Catches template/schema-level defects (bad YAML,
  # invalid fields, wrong apiVersions) in seconds, per chart.
  lint-and-render:
    needs: detect
    if: needs.detect.outputs.run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: [mcp-hangar, mcp-hangar-operator]
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: helm lint
        run: helm lint "${{ matrix.chart }}"

      - name: helm template (default values) | kubeconform
        run: |
          set -euo pipefail
          helm template t "${{ matrix.chart }}" \
            | kubeconform -strict -ignore-missing-schemas -kubernetes-version "$KUBERNETES_VERSION" -summary -

      - name: helm template (ci-values.yaml) | kubeconform
        if: hashFiles(format('{0}/ci-values.yaml', matrix.chart)) != ''
        run: |
          set -euo pipefail
          helm template t "${{ matrix.chart }}" -f "${{ matrix.chart }}/ci-values.yaml" \
            | kubeconform -strict -ignore-missing-schemas -kubernetes-version "$KUBERNETES_VERSION" -summary -

  # The crux: install each chart against its pinned appVersion image on a
  # real cluster and assert it actually works, not just that it renders.
  install-smoke:
    needs: [detect, lint-and-render]
    if: needs.detect.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: ${{ env.KIND_NODE_IMAGE }}
          cluster_name: chart-ci
          wait: 90s

      # ── core (mcp-hangar) ────────────────────────────────────────────
      # unsafeNoAuth: the 1.5 server refuses to bind non-loopback without
      # auth configured. That's intended behavior; the flag is the
      # documented demo path, and what we use here to exercise the rest
      # of the install without also standing up an OIDC provider.
      - name: Install core (mcp-hangar)
        id: install_core
        continue-on-error: true
        run: |
          set -euo pipefail

          # Re-port-forwards and polls /health/ready; called after install,
          # upgrade and rollback so those three checks don't triplicate the
          # same block.
          wait_for_core_ready() {
            local label="$1"
            kubectl -n core port-forward svc/core-mcp-hangar 18080:8080 >/tmp/core-pf.log 2>&1 &
            local pf_pid=$!

            local code="" ready=false
            for _ in $(seq 1 20); do
              code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/health/ready || true)
              if [ "$code" = "200" ]; then
                ready=true
                break
              fi
              sleep 1
            done

            kill "$pf_pid" 2>/dev/null || true

            if [ "$ready" != "true" ]; then
              echo "::error::GET /health/ready (${label}) did not return 200 (last code: ${code:-<none>})"
              cat /tmp/core-pf.log || true
              return 1
            fi
            echo "GET /health/ready (${label}) -> 200"
          }

          echo "::group::helm install core"
          helm install core ./mcp-hangar -n core --create-namespace --wait --timeout 300s \
            --set config.unsafeNoAuth=true
          echo "::endgroup::"

          echo "::group::pod readiness"
          kubectl -n core get pods -o wide
          kubectl -n core wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=mcp-hangar,app.kubernetes.io/instance=core \
            --timeout=60s
          echo "::endgroup::"

          echo "::group::GET /health/ready"
          wait_for_core_ready "initial install"
          echo "::endgroup::"

          echo "::group::helm test core"
          helm test core -n core --logs
          echo "::endgroup::"

          # Upgrade + rollback (#7): core has no leader-election, so
          # bumping replicaCount is a real behavior change that --wait can
          # safely gate on (contrast the operator below, where the same
          # move would hang -- see #26).
          echo "::group::helm upgrade core (replicaCount=2)"
          helm upgrade core ./mcp-hangar -n core --reuse-values --wait --timeout 300s \
            --set replicaCount=2
          echo "::endgroup::"

          echo "::group::GET /health/ready (post-upgrade)"
          wait_for_core_ready "post-upgrade"
          echo "::endgroup::"

          echo "::group::helm rollback core to revision 1"
          helm rollback core 1 -n core --wait --timeout 300s
          echo "::endgroup::"

          echo "::group::GET /health/ready (post-rollback)"
          wait_for_core_ready "post-rollback"
          echo "::endgroup::"

      - name: Diagnostics (core) on failure
        if: steps.install_core.outcome == 'failure'
        run: |
          echo "---- pods ----"
          kubectl -n core get pods -o wide || true
          echo "---- describe pods ----"
          kubectl -n core describe pods || true
          echo "---- events ----"
          kubectl -n core get events --sort-by=.lastTimestamp || true
          echo "---- logs ----"
          kubectl -n core logs -l app.kubernetes.io/name=mcp-hangar --all-containers --tail=300 || true
          echo "---- port-forward log ----"
          cat /tmp/core-pf.log || true

      # ── operator (mcp-hangar-operator) ───────────────────────────────
      # Default values (webhooks off) -- no cert-manager in this cluster.
      - name: Install operator (mcp-hangar-operator)
        id: install_operator
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "::group::helm install operator"
          helm install op ./mcp-hangar-operator -n op --create-namespace --wait --timeout 300s
          echo "::endgroup::"

          echo "::group::operator pod readiness"
          kubectl -n op get pods -o wide
          kubectl -n op wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=mcp-hangar-operator,app.kubernetes.io/instance=op \
            --timeout=60s
          echo "::endgroup::"

          echo "::group::CRDs Established"
          kubectl wait --for=condition=Established --timeout=60s \
            crd/mcpservers.mcp-hangar.io \
            crd/mcpservergroups.mcp-hangar.io \
            crd/mcpdiscoverysources.mcp-hangar.io
          echo "::endgroup::"

          echo "::group::apply MCPServer sample and wait for reconcile"
          # A one-line JSON doc via a here-string, not a heredoc: a heredoc
          # terminator must sit at column 0 to match, which would end the
          # enclosing YAML `run: |` block scalar early (YAML block scalars
          # end at the first less-indented line) and break this workflow
          # file. JSON is valid YAML, so kubectl's decoder accepts it as-is.
          # Image is deliberately unpullable -- we assert the operator
          # reconciled (status populated, child Pod created with an
          # ownerReference back to us), not that the image pulls;
          # ImagePullBackOff on the child Pod here is expected and fine.
          kubectl -n op apply -f - <<< '{"apiVersion":"mcp-hangar.io/v1alpha2","kind":"MCPServer","metadata":{"name":"ci-smoke"},"spec":{"mode":"container","image":"ghcr.io/mcp-hangar/does-not-exist:ci-smoke-test"}}'

          pod_name=""
          deadline=$((SECONDS + 90))
          while [ "$SECONDS" -lt "$deadline" ]; do
            pod_name="$(kubectl -n op get mcpserver ci-smoke -o jsonpath='{.status.podName}' 2>/dev/null || true)"
            if [ -n "$pod_name" ]; then
              break
            fi
            sleep 3
          done

          if [ -z "$pod_name" ]; then
            echo "::error::operator never set status.podName on MCPServer/ci-smoke within 90s"
            kubectl -n op get mcpserver ci-smoke -o yaml || true
            exit 1
          fi
          echo "status.podName = $pod_name"

          owner="$(kubectl -n op get pod "$pod_name" -o jsonpath='{.metadata.ownerReferences[?(@.kind=="MCPServer")].name}' 2>/dev/null || true)"
          if [ "$owner" != "ci-smoke" ]; then
            echo "::error::child Pod $pod_name has no ownerReference back to MCPServer/ci-smoke (got: '${owner:-<none>}')"
            kubectl -n op get pod "$pod_name" -o yaml || true
            exit 1
          fi
          echo "child Pod $pod_name has ownerReference -> MCPServer/ci-smoke (reconcile confirmed)"
          echo "::endgroup::"

          # Upgrade + rollback (#7): deliberately NOT replicaCount>1. The
          # operator's /readyz is leader-gated -- only the elected leader
          # reports ready -- so `helm upgrade --wait` at 2 replicas waits
          # for a standby to become Ready, which never happens, and hangs
          # (issue #26). A benign podAnnotations change exercises the
          # upgrade/rollback path itself without re-triggering that hang.
          echo "::group::helm upgrade operator (benign podAnnotations change)"
          helm upgrade op ./mcp-hangar-operator -n op --reuse-values --wait --timeout 300s \
            --set-string podAnnotations.ci-upgrade-test=1
          echo "::endgroup::"

          echo "::group::operator Deployment Available (post-upgrade)"
          kubectl -n op wait --for=condition=Available deployment/op-mcp-hangar-operator --timeout=60s
          echo "::endgroup::"

          echo "::group::helm rollback operator to revision 1"
          helm rollback op 1 -n op --wait --timeout 300s
          echo "::endgroup::"

          echo "::group::operator Deployment Available (post-rollback)"
          kubectl -n op wait --for=condition=Available deployment/op-mcp-hangar-operator --timeout=60s
          echo "::endgroup::"

      - name: Diagnostics (operator) on failure
        if: steps.install_operator.outcome == 'failure'
        run: |
          echo "---- pods ----"
          kubectl -n op get pods -o wide || true
          echo "---- describe pods ----"
          kubectl -n op describe pods || true
          echo "---- crds ----"
          kubectl get crds | grep mcp-hangar.io || true
          echo "---- MCPServer ----"
          kubectl -n op get mcpserver ci-smoke -o yaml || true
          echo "---- events ----"
          kubectl -n op get events --sort-by=.lastTimestamp || true
          echo "---- operator logs ----"
          kubectl -n op logs -l app.kubernetes.io/name=mcp-hangar-operator --all-containers --tail=300 || true

      - name: Gate on install-smoke results
        if: always()
        run: |
          status=0
          for pair in "core:${{ steps.install_core.outcome }}" "operator:${{ steps.install_operator.outcome }}"; do
            name="${pair%%:*}"
            outcome="${pair##*:}"
            echo "${name}: ${outcome}"
            if [ "$outcome" != "success" ]; then
              status=1
            fi
          done
          exit "$status"

  # The one job to mark as a required status check. It `needs` everything
  # above and runs unconditionally (`if: always()`), so it always posts a
  # result -- unlike lint-and-render/install-smoke, which skip on a
  # non-chart PR and would otherwise leave a required check pending
  # forever. It fails only if a needed job actually failed; a job that was
  # itself skipped (the detect.run == 'false' path) is fine.
  charts-required:
    needs: [detect, lint-and-render, install-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          status=0
          for pair in "detect:${{ needs.detect.result }}" "lint-and-render:${{ needs.lint-and-render.result }}" "install-smoke:${{ needs.install-smoke.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            echo "${name}: ${result}"
            if [ "$result" = "failure" ]; then
              status=1
            fi
          done
          exit "$status"
