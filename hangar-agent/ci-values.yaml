# Production-like values for CI dry-run testing.
# This file is used in CI to validate template rendering with realistic
# configuration. It is NOT intended for actual deployment.

replicaCount: 1

agent:
  cloudAddr: "cloud.mcp-hangar.io:443"
  licenseKey: "override-in-production-via-secret"
  clusterName: "prod-us-east-1"
  agentVersion: "0.1.0"
  tlsEnabled: true
  heartbeatInterval: "30s"
  eventBatchInterval: "5s"
  metricSnapshotInterval: "60s"
  walDir: "/data/wal"

persistence:
  enabled: true
  storageClass: "gp3"
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

networkPolicy:
  enabled: true
  allowMonitoring: true
