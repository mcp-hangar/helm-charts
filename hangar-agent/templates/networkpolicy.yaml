{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hangar-agent.fullname" . }}
  labels:
    {{- include "hangar-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hangar-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Agent typically receives no inbound traffic; probes are local.
    # Allow monitoring scraping if needed.
    {{- if .Values.networkPolicy.allowMonitoring }}
    - ports:
        - port: 9090
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound gRPC to Hangar Cloud (443 for TLS, 9090 for plain)
    - ports:
        - port: 443
          protocol: TCP
        - port: 9090
          protocol: TCP
    # Allow connection to local mcp-hangar if configured
    - ports:
        - port: 8080
          protocol: TCP
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
