apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hangar-agent.fullname" . }}
  labels:
    {{- include "hangar-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hangar-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate  # Only one agent per cluster — no rolling
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hangar-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hangar-agent.fullname" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AGENT_CLOUD_ADDR
              value: {{ .Values.agent.cloudAddr | quote }}
            - name: AGENT_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hangar-agent.fullname" . }}-secrets
                  key: license-key
            - name: AGENT_CLUSTER_NAME
              value: {{ .Values.agent.clusterName | default .Release.Namespace | quote }}
            - name: AGENT_AGENT_VERSION
              value: {{ .Values.agent.agentVersion | quote }}
            - name: AGENT_TLS_ENABLED
              value: {{ .Values.agent.tlsEnabled | quote }}
            {{- if .Values.agent.tlsCaCert }}
            - name: AGENT_TLS_CA_CERT
              value: {{ .Values.agent.tlsCaCert | quote }}
            {{- end }}
            {{- if .Values.agent.tls.secretName }}
            - name: AGENT_TLS_CERT_PATH
              value: "{{ .Values.agent.tls.mountPath }}/tls.crt"
            - name: AGENT_TLS_KEY_PATH
              value: "{{ .Values.agent.tls.mountPath }}/tls.key"
            {{- end }}
            - name: AGENT_HEARTBEAT_INTERVAL
              value: {{ .Values.agent.heartbeatInterval | quote }}
            - name: AGENT_EVENT_BATCH_INTERVAL
              value: {{ .Values.agent.eventBatchInterval | quote }}
            - name: AGENT_METRIC_SNAPSHOT_INTERVAL
              value: {{ .Values.agent.metricSnapshotInterval | quote }}
            - name: AGENT_RECONNECT_BACKOFF_MAX
              value: {{ .Values.agent.reconnectBackoffMax | quote }}
            - name: AGENT_WAL_DIR
              value: {{ .Values.agent.walDir | quote }}
            {{- if .Values.agent.mcpHangarAddr }}
            - name: AGENT_MCP_HANGAR_ADDR
              value: {{ .Values.agent.mcpHangarAddr | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: wal-data
              mountPath: {{ .Values.agent.walDir }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.agent.tls.secretName }}
            - name: tls-certs
              mountPath: {{ .Values.agent.tls.mountPath }}
              readOnly: true
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: wal-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hangar-agent.fullname" . }}-wal
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.agent.tls.secretName }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.agent.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hangar-agent.fullname" . }}
  labels:
    {{- include "hangar-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hangar-agent.fullname" . }}-secrets
  labels:
    {{- include "hangar-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  license-key: {{ required "agent.licenseKey is required" .Values.agent.licenseKey | b64enc | quote }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hangar-agent.fullname" . }}-wal
  labels:
    {{- include "hangar-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}

