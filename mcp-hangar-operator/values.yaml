# MCP-Hangar Operator Configuration
# ===================================

# Replica count for operator deployment.
#
# Defaults to 1. The operator gates /readyz on winning leader election
# (operator.leaderElection.enabled=true): only the elected leader reports
# Ready, and standby replicas legitimately stay NotReady until they win
# leadership. That's correct steady-state behavior, but with
# `helm install/upgrade --wait`, Helm waits for ALL Pods in the Deployment
# to become Ready -- with replicaCount >= 2 it will wait for every standby
# to also become the leader, which never happens, and the wait times out
# (issue #26).
#
# Set replicaCount >= 2 for HA once you're not relying on `helm --wait`
# to gate on Deployment readiness (e.g. CI/CD that polls a different
# signal, or accepts that standby replicas report NotReady by design).
replicaCount: 1

# Deployment update strategy. The same leader-gated readiness above also
# breaks a RollingUpdate: it surges a new Pod that cannot become Ready until
# the old leader releases its lease, but the old Pod is not terminated until
# the new one is Ready -- so the rollout deadlocks and `helm upgrade --wait`
# times out. `Recreate` terminates the old Pod first (releasing the lease),
# then starts the new one, which then acquires leadership and becomes Ready.
# Override to RollingUpdate only for HA (replicaCount >= 2) where you have
# accounted for the leader-gating interaction.
updateStrategy: Recreate

# Operator image configuration
image:
  repository: ghcr.io/mcp-hangar/mcp-hangar-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag (defaults to chart appVersion)
  tag: ""

# Image pull secrets for private registries
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  # Create a service account
  create: true
  # Annotations for the service account
  annotations: {}
  # Name override (generated if empty)
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# Operator Configuration
# =============================================================================
operator:
  # Log level passed to the manager via --zap-log-level (controller-runtime's
  # zap logging flag). Accepts: debug, info, error, or an integer verbosity
  # level (e.g. "2"). Note: "warn" is NOT a supported value.
  logLevel: info

  # Metrics configuration
  metrics:
    # Enable metrics endpoint
    enabled: true
    # Metrics bind port
    port: 8080

  # Health probe configuration
  health:
    # Health probe bind port
    port: 8081

  # Leader election for HA
  leaderElection:
    # Enable leader election
    enabled: true
    # Namespace for leader election lease (defaults to release namespace)
    namespace: ""
    # Duration that non-leader candidates will wait after observing a
    # leadership renewal before attempting to acquire the lease
    leaseDuration: "15s"
    # Interval between attempts by the acting leader to renew the lease
    renewDeadline: "10s"
    # Duration between leader election retries
    retryPeriod: "2s"

  # Graceful shutdown settings
  gracefulShutdown:
    # Maximum duration the manager waits for running reconcilers on shutdown.
    # Must be less than terminationGracePeriodSeconds.
    timeout: "10s"
    # terminationGracePeriodSeconds for the pod. Must be greater than
    # gracefulShutdown.timeout to allow the manager to drain work before
    # the kubelet force-kills the process.
    terminationGracePeriodSeconds: 15

  # Reconciliation settings
  reconcile:
    # Requeue interval for ready providers
    readyRequeueInterval: "5m"
    # Requeue interval for errored providers
    errorRequeueInterval: "10s"
    # Maximum concurrent reconciles per controller
    maxConcurrentReconciles: 10

# =============================================================================
# MCP-Hangar Core Connection
# =============================================================================
hangar:
  # URL of MCP-Hangar core service
  # Set to empty to run without Hangar core integration
  url: ""
  # Example: "http://mcp-hangar.mcp-hangar.svc.cluster.local:8080"

  # API key for authentication
  apiKey: ""

  # Reference existing secret for API key
  existingSecret: ""
  # Key in the secret containing the API key
  secretKey: "api-key"

# =============================================================================
# Resource Limits
# =============================================================================
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# =============================================================================
# Scheduling
# =============================================================================

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcp-hangar-operator
          topologyKey: kubernetes.io/hostname

# Priority class
priorityClassName: ""

# Topology spread constraints
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: mcp-hangar-operator

# =============================================================================
# Admission Webhooks
# =============================================================================
webhook:
  # Enable validating admission webhooks
  enabled: false
  # Webhook service port
  port: 9443
  # cert-manager integration for webhook TLS
  certManager:
    # Use cert-manager to provision webhook certificates
    enabled: true
    # Issuer kind (Issuer or ClusterIssuer)
    issuerKind: Issuer
    # Issuer name (auto-created self-signed issuer if empty)
    issuerName: ""
    # Certificate duration
    duration: "8760h"  # 1 year
    # Certificate renewal window
    renewBefore: "720h"  # 30 days
  # Failure policy for webhook (Fail or Ignore)
  failurePolicy: Fail
  # Timeout in seconds for webhook calls
  timeoutSeconds: 10
  # Pod-registration admission webhook (operator #50/#69). Rejects pods
  # labelled mcp-hangar.io/provider=<name> when no MCPServer <name> is
  # registered in the namespace. Off by default: it is the stronger
  # enforcement posture and only acts in namespaces labelled
  # mcp-hangar.io/enforce-egress=true (the webhook is namespace-scoped and
  # failurePolicy: Fail). Enable once your governed namespaces carry that
  # label. Requires webhook.enabled=true.
  #
  # VERSION REQUIREMENT: the operator image must serve /validate-pod-registration
  # (mcp-hangar-operator #69). This is NOT in v0.12.2 -- enabling it against an
  # older image makes the apiserver call a route the operator returns 404 for,
  # and because failurePolicy is Fail, EVERY pod create in a governed namespace
  # is blocked. Only enable with an operator image at or past the release that
  # ships #69.
  podRegistration:
    enabled: false

# =============================================================================
# CRD Management
# =============================================================================
# CRDs are delivered via templates/crds/ only (a single, release-owned path).
# There is no separate top-level crds/ directory: shipping CRDs through both
# Helm's native crds/ dir (unmanaged, always applied on `helm install`) and
# templates/crds/ (release-owned, gated by crds.install) at the same time
# causes a Helm ownership/duplicate conflict on install. Keeping only the
# templates/crds/ path makes the CRDs upgradeable and lets `crds.install`
# and `crds.keep` actually take effect.
crds:
  # Install CRDs (templates/crds/). Disable if CRDs are managed out-of-band
  # (e.g. a separate cluster-admin step, or `helm install --skip-crds`).
  install: true
  # Keep CRDs on helm uninstall by setting the helm.sh/resource-policy: keep
  # annotation, so `helm uninstall` does not cascade-delete the CRDs (and
  # with them every MCPServer/MCPServerGroup/MCPDiscoverySource resource).
  keep: true
  # CRD conversion webhook for v1alpha1 <-> v1alpha2 conversion.
  # When enabled, the operator serves a /convert endpoint and the CRD
  # spec.conversion stanza is set to Webhook strategy. Requires
  # webhook.certManager.enabled=true (or manual TLS provisioning).
  conversion:
    enabled: false

# =============================================================================
# RBAC Configuration
# =============================================================================
rbac:
  # Create RBAC resources
  create: true
  # Grant RBAC for cilium.io CiliumNetworkPolicy so the operator's Cilium/Auto
  # egress-backstop flavor can enforce FQDN upstreams (MCPEgressPolicy). Harmless
  # (the API group is absent) on non-Cilium clusters; required on Cilium ones,
  # otherwise the backstop silently fails with a forbidden error.
  ciliumNetworkPolicies: true
  # Additional rules for ClusterRole
  additionalRules: []
  # Example:
  # - apiGroups: [""]
  #   resources: ["persistentvolumeclaims"]
  #   verbs: ["get", "list", "watch"]

# =============================================================================
# Monitoring
# =============================================================================

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  # Enable ServiceMonitor
  enabled: false
  # Namespace (defaults to release namespace)
  namespace: ""
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s
  # Additional labels
  labels: {}
  # Metric relabeling
  metricRelabelings: []
  # Target relabeling
  relabelings: []

# PrometheusRule for alerting
prometheusRule:
  # Enable PrometheusRule
  enabled: false
  # Namespace (defaults to release namespace)
  namespace: ""
  # Additional labels
  labels: {}
  # Alert rules
  rules: []
  # Example rules are generated if empty and enabled

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  # Enable network policies
  enabled: true
  # Allow ingress from monitoring namespace
  allowMonitoring: true
  # Additional ingress rules
  additionalIngress: []
  # Additional egress rules
  additionalEgress: []

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  # Enable PDB
  enabled: true
  # Minimum available pods
  minAvailable: 1
  # Maximum unavailable pods (alternative to minAvailable)
  # maxUnavailable: 1
