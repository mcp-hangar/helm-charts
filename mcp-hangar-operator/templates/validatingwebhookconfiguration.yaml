{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "mcp-hangar-operator.fullname" . }}
  labels:
    {{- include "mcp-hangar-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "mcp-hangar-operator.fullname" . }}-webhook
  {{- end }}
webhooks:
  - name: vmcpprovider.mcp-hangar.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "mcp-hangar-operator.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-mcp-hangar-io-v1alpha1-mcpprovider
        port: 443
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - mcp-hangar.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - mcpproviders
        scope: Namespaced
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
{{- end }}
