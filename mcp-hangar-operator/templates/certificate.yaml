{{- if and (include "mcp-hangar-operator.webhookEnabled" .) .Values.webhook.certManager.enabled }}
{{- if not .Values.webhook.certManager.issuerName }}
# Self-signed issuer for webhook certificates
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "mcp-hangar-operator.fullname" . }}-selfsigned
  labels:
    {{- include "mcp-hangar-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mcp-hangar-operator.fullname" . }}-webhook
  labels:
    {{- include "mcp-hangar-operator.labels" . | nindent 4 }}
spec:
  secretName: {{ include "mcp-hangar-operator.fullname" . }}-webhook-certs
  duration: {{ .Values.webhook.certManager.duration }}
  renewBefore: {{ .Values.webhook.certManager.renewBefore }}
  dnsNames:
    - {{ include "mcp-hangar-operator.fullname" . }}-webhook
    - {{ include "mcp-hangar-operator.fullname" . }}-webhook.{{ .Release.Namespace }}
    - {{ include "mcp-hangar-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "mcp-hangar-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- if .Values.webhook.certManager.issuerName }}
    name: {{ .Values.webhook.certManager.issuerName }}
    kind: {{ .Values.webhook.certManager.issuerKind }}
    {{- else }}
    name: {{ include "mcp-hangar-operator.fullname" . }}-selfsigned
    kind: Issuer
    {{- end }}
{{- end }}
