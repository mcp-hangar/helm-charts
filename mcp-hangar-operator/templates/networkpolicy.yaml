{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-hangar-operator.fullname" . }}
  labels:
    {{- include "mcp-hangar-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-hangar-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health and metrics probes
    - ports:
        - port: {{ .Values.operator.metrics.port }}
          protocol: TCP
        - port: {{ .Values.operator.health.port }}
          protocol: TCP
    {{- if and .Values.webhook.enabled }}
    # Allow webhook traffic from API server
    - ports:
        - port: {{ .Values.webhook.port }}
          protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.allowMonitoring }}
    # Allow Prometheus scraping
    - ports:
        - port: {{ .Values.operator.metrics.port }}
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- if .Values.hangar.url }}
    # Allow connection to Hangar core
    - ports:
        - port: 8080
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
