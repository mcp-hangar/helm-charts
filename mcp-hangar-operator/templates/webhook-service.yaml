{{- if (include "mcp-hangar-operator.webhookEnabled" .) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-hangar-operator.fullname" . }}-webhook
  labels:
    {{- include "mcp-hangar-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: webhook
      protocol: TCP
      name: https
  selector:
    {{- include "mcp-hangar-operator.selectorLabels" . | nindent 4 }}
{{- end }}
